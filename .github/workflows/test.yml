name: Test

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: test-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # git-restore-mtime needs full history

      # Restore source-file mtimes to their last git commit times BEFORE the
      # cache restore. Without this, fresh checkout writes every source mtime
      # to "now", which looks newer than what llbuild recorded in the cached
      # `.build/`, so it rebuilds from scratch. (PR #82 trimmed `.build/` from
      # the cache under the wrong assumption that fresh-VM inodes were the
      # culprit; SPM actually emits `file-system: device-agnostic` so llbuild
      # zeroes device+inode before equality. mtime drift was the real issue.)
      - name: Restore source mtimes from git commit times
        uses: chetan/git-restore-mtime-action@d186aca54f8760da4dec55313195e51ed3ebb0b3 # v2

      - name: Install tmux
        # macos-15 runners don't ship tmux. The reconcile reboot-recovery
        # regression test (WorktreeLifecycleTests.testRecreateAfterRebootBootstrapKillOrdering)
        # drives TmuxManager against a real tmux server on a unique socket.
        run: brew install tmux

      # macos-15 runner defaults to Xcode 16.4 (Swift 6.1.2). Pinning to
      # 26.3 (Swift 6.2.4) matches the local toolchain — keeps CI and local
      # behavior consistent.
      - name: Select Xcode 26.3 (Swift 6.2.4)
        run: sudo xcode-select -s /Applications/Xcode_26.3.app

      - name: Capture Swift toolchain version
        run: echo "SWIFT_VERSION=$(xcrun swift --version | head -1)" >> $GITHUB_ENV

      - name: Cache SwiftPM build artifacts and dependencies
        uses: actions/cache@v4
        with:
          path: |
            .build
            ~/Library/Caches/org.swift.swiftpm
          # Primary key changes per source revision so we always know what we
          # restored. restore-keys falls back to a cache with the same dep
          # set (same Package.resolved hash) — without this scoping, restore
          # could pull a cache from before a dep was added, leaving stale
          # `.build/checkouts/` that breaks SPM resolution of binary targets
          # (e.g. SwiftLintBinary).
          key: spm-build-${{ runner.os }}-${{ env.SWIFT_VERSION }}-deps-${{ hashFiles('Package.resolved') }}-src-${{ hashFiles('Package.swift', 'Sources/**/*.swift', 'Tests/**/*.swift') }}
          restore-keys: |
            spm-build-${{ runner.os }}-${{ env.SWIFT_VERSION }}-deps-${{ hashFiles('Package.resolved') }}-

      # Workaround for SwiftPM bug swiftlang/swift-package-manager#7715: a
      # cache-restored `.build/` can have a stale `TBDShared` object archive
      # alongside a fresh `.swiftmodule`. Downstream files compile against the
      # new module but the linker can't find the new symbols, producing
      # "Undefined symbols ... TBDShared.<NewType>.init" link-time flakes.
      # Wiping just the TBDShared artifacts forces SPM to re-emit them while
      # keeping the rest of `.build/` warm. Always exits 0: first-run cold
      # cache won't have these paths and that's expected.
      - name: Force-rebuild TBDShared (workaround SPM #7715)
        run: |
          echo "=== Before wipe ==="
          ls -la .build/*/debug/TBDShared.build 2>/dev/null || true
          ls -la .build/*/debug/Modules/TBDShared.swiftmodule 2>/dev/null || true
          ls -la .build/*/debug/libTBDShared*.a 2>/dev/null || true
          rm -rf .build/*/debug/TBDShared.build 2>/dev/null || true
          rm -rf .build/*/debug/Modules/TBDShared.swiftmodule 2>/dev/null || true
          rm -rf .build/*/debug/libTBDShared*.a 2>/dev/null || true
          echo "=== After wipe ==="
          ls -la .build/*/debug/TBDShared.build 2>/dev/null || true
          ls -la .build/*/debug/Modules/TBDShared.swiftmodule 2>/dev/null || true
          ls -la .build/*/debug/libTBDShared*.a 2>/dev/null || true
          exit 0

      - name: SwiftLint (strict)
        run: swift package plugin --allow-writing-to-package-directory swiftlint --strict

      # `-j 2` caps parallel swift-frontend processes. The macos-15 runner
      # has limited RAM (~7-14 GB) and Swift 6.2.4 frontends each consume
      # 1-2 GB on heavy SwiftUI / NIO code. With the default parallelism,
      # the build OOMs late (~file 1260+/1356) and emits a bare
      # `error: fatalError` with no diagnostic — different file every run.
      # Capping parallelism trades wall-clock for stability.
      - name: Test
        run: swift test --parallel -j 2

      - name: Build (verify TBDCLI and TBDDaemon executable targets compile)
        run: swift build -j 2
