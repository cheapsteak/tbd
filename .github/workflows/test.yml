name: Test

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: test-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Capture Swift toolchain version
        run: echo "SWIFT_VERSION=$(xcrun swift --version | head -1)" >> $GITHUB_ENV

      - name: Cache SwiftPM dependencies
        uses: actions/cache@v4
        with:
          path: |
            .build/checkouts
            ~/Library/Caches/org.swift.swiftpm
          key: spm-deps-${{ runner.os }}-${{ env.SWIFT_VERSION }}-${{ hashFiles('Package.resolved') }}
          restore-keys: |
            spm-deps-${{ runner.os }}-${{ env.SWIFT_VERSION }}-

      - name: Test
        run: swift test --parallel

      - name: Build (verify TBDCLI and TBDDaemon executable targets compile)
        run: swift build
