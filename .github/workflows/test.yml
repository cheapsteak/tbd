name: Test

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: test-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # git-restore-mtime needs full history

      # Restore source-file mtimes to their last git commit times BEFORE the
      # cache restore. Without this, fresh checkout writes every source mtime
      # to "now", which looks newer than what llbuild recorded in the cached
      # `.build/`, so it rebuilds from scratch. (PR #82 trimmed `.build/` from
      # the cache under the wrong assumption that fresh-VM inodes were the
      # culprit; SPM actually emits `file-system: device-agnostic` so llbuild
      # zeroes device+inode before equality. mtime drift was the real issue.)
      - name: Restore source mtimes from git commit times
        uses: chetan/git-restore-mtime-action@d186aca54f8760da4dec55313195e51ed3ebb0b3 # v2

      - name: Install tmux
        # macos-15 runners don't ship tmux. The reconcile reboot-recovery
        # regression test (WorktreeLifecycleTests.testRecreateAfterRebootBootstrapKillOrdering)
        # drives TmuxManager against a real tmux server on a unique socket.
        run: brew install tmux

      - name: Capture Swift toolchain version
        run: echo "SWIFT_VERSION=$(xcrun swift --version | head -1)" >> $GITHUB_ENV

      - name: Cache SwiftPM build artifacts and dependencies
        uses: actions/cache@v4
        with:
          path: |
            .build
            ~/Library/Caches/org.swift.swiftpm
          # Primary key changes per source revision so we always know what we
          # restored. restore-keys falls back to a cache with the same dep
          # set (same Package.resolved hash) — without this scoping, restore
          # could pull a cache from before a dep was added, leaving stale
          # `.build/checkouts/` that breaks SPM resolution of binary targets
          # like SwiftLintBinary (a build-tool plugin's prebuild command then
          # fails with "executable target 'swiftlint' built from source").
          key: spm-build-${{ runner.os }}-${{ env.SWIFT_VERSION }}-deps-${{ hashFiles('Package.resolved') }}-src-${{ hashFiles('Package.swift', 'Sources/**/*.swift', 'Tests/**/*.swift') }}
          restore-keys: |
            spm-build-${{ runner.os }}-${{ env.SWIFT_VERSION }}-deps-${{ hashFiles('Package.resolved') }}-

      - name: SwiftLint (strict)
        run: swift package plugin --allow-writing-to-package-directory swiftlint --strict

      - name: Test
        run: swift test --parallel

      - name: Build (verify TBDCLI and TBDDaemon executable targets compile)
        run: swift build
